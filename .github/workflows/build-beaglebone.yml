name: Build BeagleBone OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache curl file gawk git libncurses-dev python3 python3-distutils unzip wget zlib1g-dev

      - name: Clone OpenWrt Source
        run: |
          git clone https://openwrt.org
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for BeagleBone Black
        run: |
          cd openwrt
          # These lines automatically select the BeagleBone Black settings so you don't have to do it manually!
          echo "CONFIG_TARGET_omap=y" > .config
          echo "CONFIG_TARGET_omap_generic=y" >> .config
          echo "CONFIG_TARGET_omap_generic_DEVICE_ti_am335x-bone-black=y" >> .config
          make defconfig

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc)

      - name: Upload Finished Image
        uses: actions/upload-artifact@v4
        with:
          name: BeagleBone-OpenWrt-Image
          path: openwrt/bin/targets/omap/generic/*sdcard.img.gz
